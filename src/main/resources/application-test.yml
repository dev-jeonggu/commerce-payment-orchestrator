spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/paycore
    username: paycore
    password: paycore1234
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: localhost
      port: 6379

portone:
  # 테스트용 PortOne 더미 키
  imp-key: test_imp_key
  imp-secret: test_imp_secret

encryption:
  aes-key: ${ENCRYPTION_AES_KEY}

logging:
  level:
    com.paycore: INFO
    org.hibernate.SQL: WARN
