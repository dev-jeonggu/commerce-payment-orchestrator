spring:
  application:
    name: commerce-payment-orchestrator

  datasource:
    url: jdbc:postgresql://localhost:5432/paycore
    username: paycore
    password: paycore1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: localhost
      port: 6379

portone:
  api-url: https://api.iamport.kr
  imp-key: ${PORTONE_IMP_KEY:test_imp_key}
  imp-secret: ${PORTONE_IMP_SECRET:test_imp_secret}

scheduler:
  pending-recovery:
    fixed-delay: 300000      # 5분
    pending-threshold-minutes: 30

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

logging:
  level:
    com.paycore: DEBUG
    org.hibernate.SQL: DEBUG
