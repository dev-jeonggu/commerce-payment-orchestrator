spring:
  application:
    name: commerce-payment-orchestrator

  profiles:
    active: dev

scheduler:
  pending-recovery:
    fixed-delay: 300000      # 5분
    pending-threshold-minutes: 30
  virtual-account-expiry:
    fixed-delay: 600000      # 10분

encryption:
  # 32-byte AES-256 key (Base64 encoded).
  # default 없음 → ENCRYPTION_AES_KEY 환경변수 미설정 시 기동 실패 (의도된 동작).
  # 실제 키는 각 프로파일(dev/test)에서만 하드코딩 허용, prod는 반드시 환경변수로 주입.
  aes-key: ${ENCRYPTION_AES_KEY}

paycore:
  internal:
    # 은행/내부 시스템이 입금 확인 Webhook 전송 시 사용하는 고정 토큰.
    # 운영 환경에서는 반드시 환경변수로 주입 (INTERNAL_WEBHOOK_TOKEN).
    webhook-token: ${INTERNAL_WEBHOOK_TOKEN:dev-internal-webhook-token-change-in-prod}

management:
  tracing:
    sampling:
      probability: 1.0   # dev: 100% 샘플링. prod는 0.1 (10%)로 낮출 것.
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs
