spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/paycore
    username: paycore
    password: paycore1234
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: localhost
      port: 6379

cors:
  allowed-origins: http://localhost:3000

portone:
  # dev용 PortOne 테스트 키 (실제 결제 발생하지 않음)
  imp-key: test_imp_key
  imp-secret: test_imp_secret

encryption:
  aes-key: ${ENCRYPTION_AES_KEY}

logging:
  level:
    com.paycore: DEBUG
    org.hibernate.SQL: DEBUG
