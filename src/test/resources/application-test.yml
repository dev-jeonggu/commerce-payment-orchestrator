spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/paycore
    username: paycore
    password: paycore1234
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: localhost
      port: 6379

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

portone:
  api-url: https://api.iamport.kr
  imp-key: test_key
  imp-secret: test_secret

scheduler:
  pending-recovery:
    fixed-delay: 9999999
    pending-threshold-minutes: 30

logging:
  level:
    com.paycore: INFO
    org.hibernate.SQL: OFF
