services:
  postgres:
    image: postgres:15-alpine
    container_name: paycore-postgres
    environment:
      POSTGRES_DB: paycore
      POSTGRES_USER: paycore
      POSTGRES_PASSWORD: paycore1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paycore"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - paycore-net

  redis:
    image: redis:7-alpine
    container_name: paycore-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - paycore-net

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: paycore-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/paycore
      DB_USERNAME: paycore
      DB_PASSWORD: paycore1234
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      PORTONE_IMP_KEY: ${PORTONE_IMP_KEY:-test_imp_key}
      PORTONE_IMP_SECRET: ${PORTONE_IMP_SECRET:-test_imp_secret}
      CORS_ALLOWED_ORIGINS: "*"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api-docs > /dev/null || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - paycore-net
    restart: on-failure:3

  frontend:
    build:
      context: ../Commerce-Payment-UI
      dockerfile: Dockerfile
      args:
        - VITE_IMP_CODE=${VITE_IMP_CODE}
        - VITE_API_BASE_URL=
    container_name: paycore-frontend
    ports:
      - "8888:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - paycore-net

networks:
  paycore-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
