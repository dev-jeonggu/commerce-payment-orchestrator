# Pipeline: payment_logs 테이블 실시간 대시보드
# 1분마다 payment_logs 테이블에서 신규 레코드를 가져와 ES에 저장
# → Kibana: 결제 수단별 점유율, 가맹점별 거래액, 에러 코드 분석

input {
  jdbc {
    jdbc_driver_library    => "/usr/share/logstash/drivers/postgresql.jar"
    jdbc_driver_class      => "org.postgresql.Driver"
    jdbc_connection_string => "jdbc:postgresql://${DB_HOST:postgres}:5432/${DB_NAME:paycore}"
    jdbc_user              => "${DB_USERNAME:paycore}"
    jdbc_password          => "${DB_PASSWORD:paycore1234}"

    # 마지막으로 처리한 created_at 이후 레코드만 가져옴 (증분 수집)
    statement => "
      SELECT
        id,
        merchant_order_id,
        log_type,
        success,
        error_message,
        created_at
      FROM payment_logs
      WHERE created_at > :sql_last_value
      ORDER BY created_at ASC
    "

    use_column_value        => true
    tracking_column         => "created_at"
    tracking_column_type    => "timestamp"
    last_run_metadata_path  => "/usr/share/logstash/.jdbc_last_run_payment_logs"
    schedule                => "* * * * *"   # 1분마다 실행
    jdbc_paging_enabled     => true
    jdbc_page_size          => 1000
    type                    => "payment_log"
  }
}

filter {
  mutate {
    # ES 저장 시 Kibana 날짜 필드로 사용
    rename => { "created_at" => "@timestamp" }

    # 불필요한 메타 필드 제거
    remove_field => ["@version"]
  }

  # success 필드를 boolean으로 정규화
  if [success] == "true" or [success] == true {
    mutate { replace => { "success" => true } }
  } else {
    mutate { replace => { "success" => false } }
  }
}

output {
  elasticsearch {
    hosts => ["${ELASTICSEARCH_HOST:elasticsearch}:9200"]
    index => "paycore-payment-logs-%{+YYYY.MM.dd}"
    document_id => "%{id}"   # 중복 수집 방지: 동일 id는 upsert
    ilm_enabled => true
    ilm_rollover_alias => "paycore-payment-logs"
    ilm_policy => "paycore-30day-policy"
  }
}
