# Pipeline: 앱 로그 처리
# Filebeat가 logs/paycore.log (JSON 형식)를 수집해 전송
# → Logstash가 파싱 및 필드 보강 → Elasticsearch 저장

input {
  beats {
    port => 5044
  }
}

filter {
  # LogstashEncoder가 생성한 JSON 파싱
  json {
    source  => "message"
    target  => "parsed"
    skip_on_invalid_json => true
  }

  if [parsed] {
    mutate {
      rename => {
        "[parsed][@timestamp]" => "@timestamp"
        "[parsed][message]"    => "message"
        "[parsed][level]"      => "level"
        "[parsed][logger]"     => "logger"
        "[parsed][thread]"     => "thread"
        "[parsed][traceId]"    => "traceId"
        "[parsed][spanId]"     => "spanId"
        "[parsed][merchantId]" => "merchantId"
        "[parsed][requestId]"  => "requestId"
        "[parsed][app]"        => "app"
        "[parsed][env]"        => "env"
      }
      remove_field => ["parsed", "host", "agent", "ecs", "input", "log", "tags"]
    }
  }

  # 경보 기준: ERROR/WARN 레벨 분류
  if [level] == "ERROR" {
    mutate { add_field => { "alert_candidate" => true } }
  }

  # Webhook DLQ 발생 로그 식별 → Kibana 대시보드에서 별도 시각화
  if [message] =~ /\[WebhookDLQ\]/ {
    mutate { add_field => { "log_category" => "webhook_dlq" } }
  }

  # Saga DLQ 발생 로그 식별
  if [message] =~ /\[DLQ\]/ {
    mutate { add_field => { "log_category" => "saga_dlq" } }
  }

  # 스케줄러 복구 로그 식별
  if [message] =~ /\[Scheduler\]/ {
    mutate { add_field => { "log_category" => "scheduler_recovery" } }
  }
}

output {
  elasticsearch {
    hosts            => ["${ELASTICSEARCH_HOST:elasticsearch}:9200"]
    index            => "paycore-app-logs-%{+YYYY.MM.dd}"
    ilm_enabled      => true
    ilm_rollover_alias => "paycore-app-logs"
    ilm_policy       => "paycore-30day-policy"
  }
}
